<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – Airbnb </title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="icon" href="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/airbnb-favicon.png">
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="/airbnb-clone/index.html" class="navbar-logo">
        <img src="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/Airbnb-Logo.png" alt="Airbnb Logo" class="logo-img">
      </a>
    </div>
  </nav>

  <main class="error-page">
    <div class="animate-fade-up">
      <div style="font-size:100px;margin-bottom:8px;animation:bounce 2s infinite;">🏠</div>
      <div class="error-code">404</div>
      <h2>We can't find that page</h2>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-primary" onclick="window.location.href='../index.html'">Go to homepage</button>
        <button class="btn-outline" onclick="window.history.back()">Go back</button>
      </div>

      <div style="margin-top:48px;">
        <p style="font-size:15px;color:var(--text-light);margin-bottom:16px;">Looking for something?</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="../pages/listings.html" style="color:var(--text-dark);font-size:14px;text-decoration:underline;">Browse all listings</a>
          <a href="../pages/help.html" style="color:var(--text-dark);font-size:14px;text-decoration:underline;">Help Centre</a>
          <a href="../pages/login.html" style="color:var(--text-dark);font-size:14px;text-decoration:underline;">Log in</a>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/app.js"></script>
</body>
</html>
