<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore all stays – Airbnb </title>
  <link rel="icon" href="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/airbnb-favicon.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/cards.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body data-page="listings">
<div class="page-wrapper">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="/airbnb-clone/index.html" class="navbar-logo">
        <img src="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/Airbnb-Logo.png" alt="Airbnb Logo" class="logo-img">
      </a>
      <div class="navbar-search-compact visible">
        <div class="compact-field">Anywhere</div>
        <div class="compact-field">Any week</div>
        <div class="compact-field">Add guests</div>
        <button class="compact-search-btn">🔍</button>
      </div>
      <div class="navbar-right">
        <a href="host-dashboard.html" class="navbar-host">Become a host</a>
        <button class="navbar-globe">🌐</button>
        <button class="navbar-profile-btn" id="profile-btn">
          <span class="hamburger">☰</span>
          <span class="profile-icon">👤</span>
        </button>
      </div>
    </div>
    <div class="profile-dropdown" id="profile-dropdown">
      <div class="dropdown-group">
        <a href="signup.html" class="dropdown-item bold">Sign up</a>
        <a href="login.html" class="dropdown-item">Log in</a>
      </div>
      <div class="dropdown-group">
        <a href="host-dashboard.html" class="dropdown-item">Host your home</a>
        <a href="help.html" class="dropdown-item">Help Centre</a>
      </div>
    </div>
  </nav>

  
  <main class="listings-section">
    <div class="container">
      <!-- Filter bar -->
      <div class="filter-bar">
        <button class="filter-chip active">All types</button>
        <button class="filter-chip">Price range</button>
        <button class="filter-chip">Rooms & beds</button>
        <button class="filter-chip">Amenities</button>
        <button class="filter-chip">Top rated</button>
        <button class="filter-chip">Instant book</button>
        <button class="filter-chip">Superhost</button>
      </div>

      <h2 class="section-title">All stays</h2>
      <div class="listings-grid" id="listings-main-grid">
        <!-- Rendered by JS -->
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <div class="footer-bottom">
        <div class="footer-bottom-left">
          <span>© 2026 Airbnb Clone</span>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
        </div>
      </div>
    </div>
  </footer>

</div>
<script src="../js/app.js"></script>
<script src="../js/listings.js"></script>
<script src="../js/animations.js"></script>
</body>
</html>
