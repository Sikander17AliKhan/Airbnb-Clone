<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up – Airbnb </title>
  <link rel="icon" href="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/airbnb-favicon.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<div class="page-wrapper">
  <div class="auth-page">
    <div class="auth-card animate-scale-in">
      <div class="auth-logo-div">
      <div class="auth-logo">
        <img src="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/Airbnb-Logo.png" alt="Airbnb Logo" class="logo-img">
      </div>
      </div>

      <h2 class="auth-title">Create your account</h2>
      <p class="auth-subtitle">Join millions of travellers worldwide</p>

      <button class="social-btn" onclick="showToast('Google signup coming soon!')">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
        Continue with Google
      </button>
      <button class="social-btn" onclick="showToast('Apple signup coming soon!')">
        🍎 Continue with Apple
      </button>

      <div class="form-divider">or</div>

      <form onsubmit="signupHandler(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>First name</label>
            <input type="text" id="first-name" placeholder="First name" required>
          </div>
          <div class="form-group">
            <label>Last name</label>
            <input type="text" id="last-name" placeholder="Last name" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Create a password" required minlength="8">
        </div>
        <div class="form-group">
          <label>Date of birth</label>
          <input type="date" id="dob" required>
        </div>
        <div class="form-group">
          <label>Phone number</label>
          <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX">
        </div>

        <p style="font-size:13px;color:var(--text-light);margin:16px 0">
          By selecting <strong>Agree and continue</strong>, I agree to Airbnb's 
          <a href="#" style="color:var(--text-dark);text-decoration:underline">Terms of Service</a>, 
          <a href="#" style="color:var(--text-dark);text-decoration:underline">Payments Terms</a>, and 
          <a href="#" style="color:var(--text-dark);text-decoration:underline">Privacy Policy</a>.
        </p>

        <button type="submit" class="btn-primary btn-ripple" style="width:100%;padding:14px;font-size:16px;border-radius:var(--radius-sm);">
          Agree and continue
        </button>
      </form>

      <div class="auth-switch" style="margin-top:20px">
        Already have an account? <a href="login.html">Log in</a>
      </div>
      <div class="auth-switch" style="margin-top:8px">
        <a href="../index.html">← Back to home</a>
      </div>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
function signupHandler(e) {
  e.preventDefault();
  const first = document.getElementById('first-name').value;
  showToast(`Welcome, ${first}! Account created 🎉`);
  setTimeout(() => window.location.href = '../index.html', 1400);
}
</script>
</body>
</html>
