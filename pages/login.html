<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in – Airbnb </title>
  <link rel="icon" href="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/airbnb-favicon.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
<div class="page-wrapper">
  <div class="auth-page">
    <div class="auth-card animate-scale-in">
      <div class="auth-logo">
        <img src="/airbnb-clone/{pages,css,js,data,assets/{images,icons}}/Airbnb-Logo.png" alt="Airbnb Logo" class="logo-img">
      </div>

      <h2 class="auth-title">Welcome to Airbnb</h2>
      <p class="auth-subtitle">Log in or create an account</p>

      <button class="social-btn">
        <span>📱</span> Continue with phone
      </button>
      <button class="social-btn" onclick="showToast('Google login coming soon!')">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
        Continue with Google
      </button>
      <button class="social-btn" onclick="showToast('Apple login coming soon!')">
        🍎 Continue with Apple
      </button>
      <button class="social-btn" onclick="showToast('Facebook login coming soon!')">
        📘 Continue with Facebook
      </button>

      <div class="form-divider">or</div>

      <form onsubmit="loginHandler(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required minlength="6">
        </div>
        <button type="submit" class="btn-primary btn-ripple" style="width:100%;padding:14px;font-size:16px;border-radius:var(--radius-sm);margin-top:8px">
          Log in
        </button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
      <div class="auth-switch" style="margin-top:8px">
        <a href="../index.html">← Back to home</a>
      </div>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
function loginHandler(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  showToast('Logged in successfully! 🎉');
  setTimeout(() => window.location.href = '../index.html', 1200);
}
</script>
</body>
</html>
